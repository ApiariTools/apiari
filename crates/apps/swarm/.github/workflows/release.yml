name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: swarm-aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: swarm-x86_64-unknown-linux-gnu
    steps:
      - name: Checkout swarm
        uses: actions/checkout@v4
        with:
          path: swarm

      - name: Create workspace root
        run: |
          cat > Cargo.toml << 'TOML'
          [workspace]
          resolver = "3"
          members = ["swarm"]

          [workspace.package]
          edition = "2024"
          license = "MIT"

          [workspace.dependencies]
          serde = { version = "1", features = ["derive"] }
          serde_json = "1"
          tokio = { version = "1", features = ["full"] }
          clap = { version = "4", features = ["derive"] }
          color-eyre = "0.6"
          chrono = { version = "0.4", features = ["serde"] }
          uuid = { version = "1", features = ["v4"] }
          thiserror = "2"
          tracing = "0.1"
          tracing-subscriber = { version = "0.3", features = ["env-filter"] }
          tracing-appender = "0.2"
          libc = "0.2"
          ratatui = { version = "0.30", features = ["unstable-rendered-line-info"] }
          crossterm = { version = "0.28", features = ["event-stream"] }
          apiari-common = "0.1.0"
          apiari-tui = "0.3.0"
          apiari-claude-sdk = "0.2.0"
          apiari-codex-sdk = "0.1.2"
          apiari-gemini-sdk = "0.2.0"
          TOML

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release -p apiari-swarm --target ${{ matrix.target }}

      - name: Rename binary
        run: mv target/${{ matrix.target }}/release/swarm ${{ matrix.binary }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.binary }}

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout swarm
        uses: actions/checkout@v4
        with:
          path: swarm

      - name: Create workspace root
        run: |
          cat > Cargo.toml << 'TOML'
          [workspace]
          resolver = "3"
          members = ["swarm"]

          [workspace.package]
          edition = "2024"
          license = "MIT"

          [workspace.dependencies]
          serde = { version = "1", features = ["derive"] }
          serde_json = "1"
          tokio = { version = "1", features = ["full"] }
          clap = { version = "4", features = ["derive"] }
          color-eyre = "0.6"
          chrono = { version = "0.4", features = ["serde"] }
          uuid = { version = "1", features = ["v4"] }
          thiserror = "2"
          tracing = "0.1"
          tracing-subscriber = { version = "0.3", features = ["env-filter"] }
          tracing-appender = "0.2"
          libc = "0.2"
          ratatui = { version = "0.30", features = ["unstable-rendered-line-info"] }
          crossterm = { version = "0.28", features = ["event-stream"] }
          apiari-common = "0.1.0"
          apiari-tui = "0.3.0"
          apiari-claude-sdk = "0.2.0"
          apiari-codex-sdk = "0.1.2"
          apiari-gemini-sdk = "0.2.0"
          TOML

      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish -p apiari-swarm
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
